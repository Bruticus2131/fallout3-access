; Fallout 3 Access — konfiguracja
;
; Plik kopiowany do: <Fallout 3 GOTY>\Data\FOSE\Plugins\Fallout3Access.ini
; Kody klawiszy to scancode DirectInput (DIK_*). Lista:
;   https://www.nexusmods.com/skyrimspecialedition/articles/1175
; Najczęściej używane:
;   Enter=0x1C  Spacja=0x39  T=0x14  H=0x23  Q=0x10  X=0x2D  C=0x2E  F=0x21
;   F1=0x3B  F2=0x3C ... F12=0x58

[General]
Language    = pl       ; pl albo en
PreferSAPI  = 0        ; 1 = wymuś SAPI nawet jeśli wykryto NVDA/JAWS
; Strona kodowa tekstu GRY (etykiety menu, nazwy itemów).
;   0    = auto (pl -> 1250, inaczej systemowa ANSI)
;   1250 = polski / środkowoeuropejski    1252 = angielski / zachodni
GameTextCodepage = 0

[Modules]
PipBoy     = 1
Dialog     = 1
Barter     = 1
Lockpick   = 1
VATS       = 1
NavAssist  = 1
WorldScan  = 1
Subtitles  = 1

[Voice]
SpeakOnMenuOpen    = 1
VerbosePipBoy      = 0     ; 1 = czyta całe opisy itemów, nie tylko nazwy
ReadItemWeight     = 1
ReadItemValue      = 1
BarterWarnLossCaps = 10    ; ostrzeżenie gdy oddajesz >=N capsli wartości
NearbyScanRadius   = 1200  ; w jednostkach gry; ~64 jedn. = 1 metr
NearbyScanMaxItems = 8
CompassUnits       = 0     ; 0 = godziny zegara, 1 = stopnie
AutoWalkTurnGain   = 4     ; siła skrętu auto-chodzenia; więcej = ostrzej, mniej = łagodniej
ActivatePickRadius = 150   ; tolerancja aktywacji (End); więcej = łatwiej trafić, 0 = bez zmian

[Hotkeys]
ReadSelection   = 0x1C   ; Enter   — odczytaj aktualnie zaznaczony element
RepeatLast      = 0x35   ; /       — powtórz ostatnią wypowiedź
Silence         = 0x39   ; Spacja  — uciszenie
WhereAmI        = 0x26   ; L       — lokalizacja gracza
PlayerStatus    = 0x23   ; H       — HP, AP, RAD, capsy
QuestTarget     = 0x25   ; K       — kierunek i dystans do questmarkera
ScanNearby      = 0x2D   ; X       — najbliższe NPC, drzwi, kontenery
ScanHostiles    = 0x2E   ; C       — tylko wrogowie
DescribeCompass = 0x21   ; F       — co jest na kompasie (kierunki świata)
ToggleMod       = 0x58   ; F12     — włącz/wyłącz mod
DumpMenuTree    = 0x57   ; F11     — diagnostyka: zrzut drzewa aktywnego menu do logu
DebugStartGame  = 0x44   ; F10     — uruchom komendę [Debug] StartGameCommand (np. coc)
MenuBack        = 0x0E   ; Backspace — cofnij o jeden poziom menu (klika przycisk Wstecz)
ScanPrev        = 0xC9   ; Page Up   — poprzedni obiekt (Ctrl+PgUp = poprz. kategoria)
ScanNext        = 0xD1   ; Page Down — następny obiekt (Ctrl+PgDn = nast. kategoria)
TurnTo          = 0x28   ; '         — obróć się do wybranego obiektu
GuideBeacon     = 0x27   ; ;         — naprowadzanie dźwiękiem do celu (sam idziesz W)
AutoWalk        = 0x2B   ; \         — automatyczne dojście do celu (otwarty teren)
GuideQuest      = 0x34   ; .         — naprowadzanie dźwiękiem do markera zadania
ActivateTarget  = 0xCF   ; End       — aktywuj wybrany obiekt (bez celowania krzyżykiem)

[Debug]
; Komenda konsoli uruchamiana hotkeyem DebugStartGame (F10).
; Z menu głównego "coc <cela>" startuje nową grę w danej celi, pomijając intro.
; Kandydaci do wypróbowania jeśli MegatonWorld nie zadziała:
;   coc MegatonWorld   coc Megaton   coc TestQAItems   coc Vault101
StartGameCommand = coc MegatonWorld
